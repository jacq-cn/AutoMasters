    <main>
        <section>
            <h1>Contact us or leave a message for your car repairs.</h1>
            <h2>Contact Information</h2>
            <p><a href="tel:+7632518323">(763)-251-8323</a></p>
            <p><a href="mailto:Automastersmn@gmail.com" class="btn">Automastersmn@gmail.com</a></p>
            <p>Open Monday-Friday: 8AM-5PM</p>
            
            <address>
            <h2>Address</h2>
            <p>20998 134th AVE N Suite 108</p>
            <p>Rogers, MN 55374</p>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2811.442332519182!2d-93.5460914!3d45.198383899999996!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x52b3431d8f73f1c5%3A0x28fdc16c484bc1de!2sAutoMasters!5e0!3m2!1sen!2sus!4v1780447533820!5m2!1sen!2sus" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </address>

        </section>

        <section>
            <h2>Leave a Message</h2>
            <form action="test">

                <label for="name">First & Last Name</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Enter your full name"
                    required
                >
            
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                >
            
                <label for="comments">Additional Comments</label>
                <textarea
                    id="comments"
                    name="comments"
                    rows="4"
                ></textarea>
            
                <button type="submit">
                    Submit
                </button>
            
            </form>
        </section>
    </main>

    <footer>
        <p>Copyright © 2023, Automasters</p>
